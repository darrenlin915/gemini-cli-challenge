steps:
- id: 'Build all containers'
  name: 'gcr.io/k8s-skaffold/skaffold:v2.14.1'
  entrypoint: 'bash'
  args:
  - '-c'
  - >
    skaffold build -f=skaffold.yaml --default-repo=gcr.io/$PROJECT_ID;

timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_8'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET