# Build and push container images to Artifact Registry.
# Fallback for direct pushes to main (non-merge commits).
# For normal PR flow, images are built by cloudbuild-pr.yaml during PR CI.

steps:
- id: 'Configure Docker auth'
  name: 'gcr.io/cloud-builders/gcloud'
  args: ['auth', 'configure-docker', 'us-central1-docker.pkg.dev', '--quiet']

- id: 'Build and push images'
  name: 'gcr.io/k8s-skaffold/skaffold:v2.14.1'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    BUILD_FLAGS=""
    if [ -n "${_BUILD_ARTIFACTS}" ]; then
      IFS=',' read -ra ARTIFACTS <<< "${_BUILD_ARTIFACTS}"
      for art in "$${ARTIFACTS[@]}"; do
        BUILD_FLAGS="$$BUILD_FLAGS -b $$art"
      done
    fi
    skaffold build -f=skaffold.yaml -p ci \
      --default-repo=us-central1-docker.pkg.dev/$PROJECT_ID/microservices-demo \
      --tag=${SHORT_SHA} --build-concurrency=0 $$BUILD_FLAGS

substitutions:
  _BUILD_ARTIFACTS: ''

timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_8'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
