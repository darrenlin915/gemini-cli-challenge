name: "CD - Main"
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'
      - 'environments/**'

jobs:
  update-changed-services:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 3
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Detect changed services and update Helm values
      run: |
        set -e

        # Detect which services changed in this merge
        PR_SHA=$(git rev-parse HEAD^2 2>/dev/null | head -c 7 || echo "")
        if [ -z "$PR_SHA" ]; then
          echo "::warning::Not a merge commit — no services to update"
          exit 0
        fi

        CHANGED_DIRS=$(git diff --name-only HEAD^1...HEAD^2 -- src/ | cut -d'/' -f2 | sort -u)

        # Map directory names to Helm values keys
        declare -A DIR_TO_KEY=(
          [adservice]=adService
          [cartservice]=cartService
          [checkoutservice]=checkoutService
          [currencyservice]=currencyService
          [emailservice]=emailService
          [frontend]=frontend
          [loadgenerator]=loadGenerator
          [paymentservice]=paymentService
          [productcatalogservice]=productCatalogService
          [recommendationservice]=recommendationService
          [shippingservice]=shippingService
        )

        UPDATED=""
        for dir in $CHANGED_DIRS; do
          KEY="${DIR_TO_KEY[$dir]}"
          if [ -n "$KEY" ]; then
            UPDATED="${UPDATED:+$UPDATED, }$dir"
            # Update per-service tag in all environment values files
            for ENV_FILE in environments/*/values.yaml; do
              sed -i "/^${KEY}:/,/^[a-zA-Z]/{s/tag: \".*\"/tag: \"${PR_SHA}\"/}" "$ENV_FILE"
            done
          fi
        done

        if [ -z "$UPDATED" ]; then
          echo "No service source code changes — skipping"
          exit 0
        fi

        echo "Updated services: $UPDATED (tag: $PR_SHA)"

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        PR_SHA=$(git rev-parse HEAD^2 2>/dev/null | head -c 7 || echo "unknown")
        git commit -m "chore(cd): update changed service tags to ${PR_SHA} [skip ci]"
        git push origin main
