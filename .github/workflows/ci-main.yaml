name: "CD - Main"
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'
      - 'environments/**'

jobs:
  retag-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v2

    - name: Retag images from PR build
      id: retag
      run: |
        set -e
        NEW_TAG=${GITHUB_SHA::7}
        echo "image_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

        # Get PR head commit SHA (second parent of merge commit)
        PR_SHA=$(git rev-parse HEAD^2 2>/dev/null | head -c 7 || echo "")

        if [ -z "$PR_SHA" ]; then
          echo "::warning::Not a merge commit — falling back to full Cloud Build"
          gcloud builds submit \
            --config=cloudbuild-pr.yaml \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --region=us-central1 \
            --substitutions=SHORT_SHA=$NEW_TAG
          exit 0
        fi

        echo "Retagging images from $PR_SHA to $NEW_TAG"
        REPO="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/microservices-demo"
        SERVICES="adservice cartservice checkoutservice currencyservice emailservice frontend loadgenerator paymentservice productcatalogservice recommendationservice shippingservice"

        for svc in $SERVICES; do
          gcloud artifacts docker tags add \
            "$REPO/$svc:$PR_SHA" \
            "$REPO/$svc:$NEW_TAG" \
            --quiet &
        done
        wait

    - name: Update Helm values for ArgoCD
      run: |
        set -e
        IMAGE_TAG=${{ steps.retag.outputs.image_tag }}
        PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

        for ENV in dev staging prod; do
          cat > environments/${ENV}/values.yaml <<EOF
        # ${ENV^} Environment Values
        images:
          repository: us-central1-docker.pkg.dev/${PROJECT_ID}/microservices-demo
          tag: "${IMAGE_TAG}"
        EOF
        done

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/
        git commit -m "chore(cd): update image tag to ${{ steps.retag.outputs.image_tag }} [skip ci]"
        git push origin main
