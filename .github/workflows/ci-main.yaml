name: "CD - Main"
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'
      - 'environments/**'

# Serialize CD runs so two back-to-back merges don't race on `git push` to main.
# cancel-in-progress: false (not true) — killing the in-flight run would lose
# its tag bump entirely; we want every merge's tag update to land, in order.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Mint GitHub App token
      id: app-token
      if: ${{ vars.APP_ID }}
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ vars.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}

    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}

    - name: Detect changed services and update dev values
      id: update
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        # Resolve the PR head SHA and the diff range. Two cases:
        #  - True merge commit (`gh pr merge --merge`): HEAD has 2 parents,
        #    HEAD^2 is the PR head and HEAD^1..HEAD^2 is the PR's diff.
        #  - Squash commit (`gh pr merge --squash`) or direct push: HEAD has
        #    1 parent. We pull the PR number out of the commit subject
        #    (GitHub's `(#N)` suffix) and look up the original head SHA via
        #    the GitHub API so the tag matches the image PR CI built.
        if git rev-parse --verify --quiet HEAD^2 >/dev/null; then
          PR_SHA=$(git rev-parse HEAD^2 | head -c 7)
          DIFF_RANGE="HEAD^1..HEAD^2"
        else
          PR_NUM=$(git log -1 --pretty=%s | sed -nE 's/.*\(#([0-9]+)\)$/\1/p')
          if [ -z "$PR_NUM" ]; then
            echo "::warning::HEAD is neither a merge commit nor a squash-PR commit — no services to update"
            echo "updated=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_SHA=$(gh pr view "$PR_NUM" --json headRefOid --jq .headRefOid | head -c 7)
          DIFF_RANGE="HEAD^1..HEAD"
        fi

        CHANGED_DIRS=$(git diff --name-only "$DIFF_RANGE" -- src/ | cut -d'/' -f2 | sort -u)

        declare -A DIR_TO_KEY=(
          [adservice]=adService
          [cartservice]=cartService
          [checkoutservice]=checkoutService
          [currencyservice]=currencyService
          [emailservice]=emailService
          [frontend]=frontend
          [loadgenerator]=loadGenerator
          [paymentservice]=paymentService
          [productcatalogservice]=productCatalogService
          [recommendationservice]=recommendationService
          [shippingservice]=shippingService
        )

        DEV_FILE=environments/dev/values.yaml
        UPDATED=""
        for dir in $CHANGED_DIRS; do
          KEY="${DIR_TO_KEY[$dir]:-}"
          if [ -n "$KEY" ]; then
            UPDATED="${UPDATED:+$UPDATED, }$dir"
            yq -i ".${KEY}.tag = \"${PR_SHA}\"" "$DEV_FILE"
          fi
        done

        if [ -z "$UPDATED" ]; then
          echo "No service source code changes — skipping"
          echo "updated=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
        echo "tag=$PR_SHA" >> "$GITHUB_OUTPUT"

        {
          echo "## Dev deploy"
          echo ""
          echo "**Tag:** \`$PR_SHA\`"
          echo "**Services:** $UPDATED"
          echo ""
          echo "Staging and prod are unchanged. Use the \`Promote\` workflow to advance this tag."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Commit and push
      if: steps.update.outputs.updated != ''
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/dev/values.yaml
        git diff --cached --quiet && echo "No changes to commit" && exit 0
        git commit -m "chore(cd): deploy ${{ steps.update.outputs.tag }} to dev (services: ${{ steps.update.outputs.updated }}) [skip ci]"
        git push origin main
