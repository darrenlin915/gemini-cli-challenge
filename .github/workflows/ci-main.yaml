name: "CD - Main"
on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'
      - 'environments/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v2
    - name: Build and push images via Cloud Build
      id: build
      timeout-minutes: 30
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        echo "image_tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"

        gcloud builds submit \
          --config=cloudbuild.yaml \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --region=us-central1 \
          --substitutions=SHORT_SHA=$SHORT_SHA

  update-helm-values:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Update Helm values for ArgoCD
      run: |
        set -e
        IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
        PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}

        for ENV in dev staging prod; do
          cat > environments/${ENV}/values.yaml <<EOF
        # ${ENV^} Environment Values
        images:
          repository: us-central1-docker.pkg.dev/${PROJECT_ID}/microservices-demo
          tag: "${IMAGE_TAG}"
        EOF
        done
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add environments/
        git commit -m "chore(cd): update image tag to ${{ needs.build-and-push.outputs.image_tag }} [skip ci]"
        git push origin main
