name: "CI - Pull Request"
on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/README.md'
      - 'kustomize/**'
      - '.github/workflows/kustomize-build-ci.yaml'
      - 'terraform/**'
      - '.github/workflows/terraform-validate-ci.yaml'
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-ci.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_src_changes: ${{ steps.changes.outputs.has_src_changes }}
      services: ${{ steps.changes.outputs.services }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changed services
      id: changes
      run: |
        CHANGED_DIRS=$(git diff --name-only origin/main...HEAD -- src/ | cut -d'/' -f2 | sort -u)
        SERVICES=""
        for dir in $CHANGED_DIRS; do
          case "$dir" in
            adservice|cartservice|checkoutservice|currencyservice|emailservice|\
            frontend|loadgenerator|paymentservice|productcatalogservice|\
            recommendationservice|shippingservice|shoppingassistantservice)
              SERVICES="${SERVICES:+$SERVICES,}$dir" ;;
          esac
        done

        if [ -z "$SERVICES" ]; then
          echo "has_src_changes=false" >> "$GITHUB_OUTPUT"
          echo "No source code changes detected — skipping tests and build"
        else
          echo "has_src_changes=true" >> "$GITHUB_OUTPUT"
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Changed services: $SERVICES"
        fi

  code-tests:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_src_changes == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0'
    - uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Go Unit Tests
      timeout-minutes: 10
      run: |
        for GO_PACKAGE in "shippingservice" "productcatalogservice" "frontend/validator"; do
          echo "Testing $GO_PACKAGE..."
          pushd src/$GO_PACKAGE
          go test
          popd
        done
    - name: C# Unit Tests
      timeout-minutes: 10
      run: |
        dotnet test src/cartservice/

  build-images:
    needs: [detect-changes, code-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
        service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
    - uses: google-github-actions/setup-gcloud@v2
    - name: Build and push changed images via Cloud Build
      timeout-minutes: 30
      run: |
        gcloud builds submit \
          --config=cloudbuild-pr.yaml \
          --project=${{ secrets.GCP_PROJECT_ID }} \
          --region=us-central1 \
          --substitutions=SHORT_SHA=${GITHUB_SHA::7},_BUILD_ARTIFACTS=${{ needs.detect-changes.outputs.services }}
